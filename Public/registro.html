<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>

    <div class="hero">
        <h1>Registro de usuario</h1>
        <p>Por favor, complete los siguientes campos para registrarse.</p>
    </div>
    <main class="contenedor">
        <h2>Escriba su nombre</h2>
        <input type="text" id="nombre" placeholder="Escriba su nombre">

        <h2>Escriba su correo</h2>
        <input type="email" id="correo" placeholder="Escriba su correo">

        <h2>Escriba su clave</h2>
        <input type="password" id="clave" placeholder="Escriba su clave">

        <input type="button" id="btn-guardar" value="Registrarse">
    </main>
    <script>
        const btnGuardar = document.getElementById('btn-guardar');

        btnGuardar.addEventListener('click', async () => {
        // Obtener colores actuales de cada parte
        const usuario = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('correo').value,
            clave: document.getElementById('clave').value,
        };
        // Enviar via fetch al servidor
        const resp = await fetch('/api/registro', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(usuario)
        });
  const data = await resp.json();
  console.log('Usuario guardado en servidor:', data);
});

    </script>
</body>
</html>
